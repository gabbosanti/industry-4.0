include:
  - ./ditto/docker-compose.yml

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: dt_mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks:
      - default

